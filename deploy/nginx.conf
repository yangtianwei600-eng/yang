# 学练 · Nginx 站点配置
# 后端监听 127.0.0.1:8000，并同时托管前端构建产物；此处做反向代理。
# 走 Cloudflare（Full 模式）回源到 443，证书用自签即可。
#
# 用法：
#   sed 's/lune.yang-888.com/你的域名/g' deploy/nginx.conf > /etc/nginx/sites-available/learn
#   ln -sf /etc/nginx/sites-available/learn /etc/nginx/sites-enabled/learn
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name lune.yang-888.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;   # 代码执行可能耗时，放宽超时
        proxy_send_timeout 300s;
        client_max_body_size 20m;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name lune.yang-888.com;

    ssl_certificate     /etc/nginx/certs/self.crt;
    ssl_certificate_key /etc/nginx/certs/self.key;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 20m;
    }
}
